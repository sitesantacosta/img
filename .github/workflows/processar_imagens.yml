name: Processamento SANTACOSTA PRO
on:
  push:
    branches:
      - main
    paths:
      - 'originais/**' # O gatilho: ativa assim que algo cair aqui dentro
  workflow_dispatch:

jobs:
  process_images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Processar e Criar Pastas
        run: |
          # Procura qualquer imagem suportada dentro da pasta originais
          find originais -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.heic" -o -iname "*.heif" \) | while read -r photo; do
            
            # Descobre se a imagem tá solta ou dentro de uma subpasta (como TRABALHOS)
            rel_path="${photo#originais/}"
            dir_path=$(dirname "$rel_path")
            filename=$(basename "$photo")
            basename="${filename%.*}"

            # O comando mkdir -p cria a pasta automaticamente se ela não existir
            mkdir -p "thumb/$dir_path"
            mkdir -p "full/$dir_path"

            # 1. GERAR THUMB
            convert "$photo" -resize 400x -quality 75 "thumb/$dir_path/${basename}.webp"

            # 2. GERAR FULL (Qualidade Alta - 2048px)
            convert "$photo" -resize '2048x>' -quality 90 -interlace plane "full/$dir_path/${basename}.jpg"

            # 3. Limpeza: apaga a imagem original processada
            rm "$photo"
          done

      - name: Salvar Alterações no Repositório
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: Imagens originais convertidas para webp [skip ci]"
          # Sem file_pattern: força o robô a salvar TODAS as alterações (pastas criadas e originais deletados)
