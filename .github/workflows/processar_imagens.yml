name: Processamento IMAGENS e JSON Geral
on:
  push:
    branches:
      - main
    paths:
      - 'originais/**' 
  workflow_dispatch:

jobs:
  process_and_manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar ImageMagick e Python
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          # Python 3 já vem pré-instalado nos ambientes do GitHub Actions

      - name: 1. Processar Imagens (Thumbs e Full)
        run: |
          # Procura imagens na pasta originais
          find originais -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.heic" -o -iname "*.heif" \) | while read -r photo; do
            
            rel_path="${photo#originais/}"
            dir_path=$(dirname "$rel_path")
            filename=$(basename "$photo")
            basename="${filename%.*}"

            # Cria as pastas de destino
            mkdir -p "thumb/$dir_path"
            mkdir -p "full/$dir_path"

            # Gerar THUMB (800px)
            convert "$photo" -resize '800x>' -quality 70 -interlace plane "thumb/$dir_path/${basename}.jpg"

            # Gerar FULL (1920px)
            convert "$photo" -resize '1920x>' -quality 70 -interlace plane "full/$dir_path/${basename}.jpg"

            # Limpeza: apaga a original para manter o repo limpo
            rm "$photo"
          done
          touch originais/.gitkeep

      - name: 2. Gerar Manifesto JSON
        run: python gerar_manifesto.py

      - name: 3. Salvar Alterações (Imagens + Manifesto)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: Imagens processadas e Manifesto atualizado [skip ci]"
